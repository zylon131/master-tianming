<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天命堂 | 1688 智能一件代发管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #1a1a1a;
            --cinnabar: #b22222;
            --gold: #d4af37;
            --clay: #f4f0ea;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #111 0%, #1c1c1c 100%);
            color: #f5f5f5;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge-admin {
            font-size: 0.75rem;
            background: var(--cinnabar);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            text-transform: uppercase;
            font-family: sans-serif;
            letter-spacing: 1px;
        }

        /* Login Screen */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: #222;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-out;
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .login-box p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        button.btn-admin {
            width: 100%;
            padding: 0.8rem 2rem;
            background: var(--cinnabar);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        button.btn-admin:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .grid-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 900px) {
            .grid-dashboard {
                grid-template-columns: 2fr 1fr;
            }
        }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-card h2 {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--gold);
            padding-left: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Products Mapping List */
        .mapping-item {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .mapping-item:hover {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }

        .mapping-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .element-tag {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Orders Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.85rem;
        }

        th {
            padding: 1rem;
            color: #888;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        tr:hover td {
            background: rgba(255,255,255,0.01);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-pending {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .status-synced {
            background: rgba(46, 139, 87, 0.15);
            color: #2e8b57;
            border: 1px solid rgba(46, 139, 87, 0.3);
        }

        .customer-info p {
            margin-bottom: 0.2rem;
        }

        .customer-name {
            font-weight: bold;
            color: #fff;
        }

        .customer-address {
            color: #aaa;
            font-size: 0.8rem;
        }

        .btn-table {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #ddd;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-table:hover {
            background: var(--cinnabar);
            border-color: var(--cinnabar);
            color: white;
        }

        .btn-sync {
            background: var(--gold);
            border-color: var(--gold);
            color: #000;
        }

        .btn-sync:hover {
            background: #f1c40f;
            border-color: #f1c40f;
            color: #000;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #333;
            color: white;
            padding: 1rem 2rem;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-left: 4px solid var(--gold);
            transform: translateY(150%);
            transition: transform 0.3s ease-out;
            z-index: 1001;
        }

        .toast.show {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Admin Login Screen -->
    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h2>天命堂管理系统</h2>
            <p>请输入管理员密钥，登录 1688 自动一件代发后台</p>
            <input type="password" id="admin-pass" placeholder="管理员密码" value="admin123">
            <button class="btn-admin" onclick="attemptLogin()">安全登录</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="container" style="display:none;" id="dashboard-content">
        <header>
            <div>
                <h1>天命堂 <span class="badge-admin">1688 Dropship Admin</span></h1>
                <p style="color: #888; font-size: 0.85rem; margin-top: 0.3rem;">智能匹配并自动代发订单，打通白标商业闭环</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-admin" onclick="exportCsv()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold);">导出 1688 批量订单 CSV</button>
                <button class="btn-admin" onclick="logout()" style="background: rgba(255,255,255,0.05); color: #ccc;">退出</button>
            </div>
        </header>

        <div class="grid-dashboard">
            <!-- Left Side: Orders -->
            <div class="section-card">
                <h2>结缘订单管理</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>时间 / 订单号</th>
                                <th>客户 & 寄送地址</th>
                                <th>匹配五行 / 法器</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="orders-list">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Side: Mappings -->
            <div class="section-card" style="align-self: start;">
                <h2>1688 商品货源绑定</h2>
                <p style="color: #888; font-size: 0.8rem; margin-bottom: 1.5rem; line-height: 1.4;">
                    在下方配置 1688 真实货源信息。用户下单后，系统将自动读取这些 ID 将收货地址推送至该 1688 商家并创建待付款订单。
                </p>
                <div id="mappings-container">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">操作成功</div>

    <script>
        let adminToken = '';

        function attemptLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (!pass) return alert("请输入密码");
            
            // Test query
            fetch(`/api/admin/orders?token=${encodeURIComponent(pass)}`)
                .then(res => {
                    if (res.ok) {
                        adminToken = pass;
                        localStorage.setItem('admin_token', pass);
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('dashboard-content').style.display = 'block';
                        loadDashboardData();
                    } else {
                        alert("密码错误，鉴权失败。");
                    }
                })
                .catch(err => alert("服务器连接失败：" + err.message));
        }

        // Auto login check
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('admin_token');
            if (saved) {
                document.getElementById('admin-pass').value = saved;
                attemptLogin();
            }
        });

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.reload();
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderLeftColor = isError ? 'var(--cinnabar)' : 'var(--gold)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function loadDashboardData() {
            try {
                // Load mappings
                const mapRes = await fetch(`/api/admin/mappings?token=${encodeURIComponent(adminToken)}`);
                const mapData = await mapRes.json();
                
                // Load orders
                const ordRes = await fetch(`/api/admin/orders?token=${encodeURIComponent(adminToken)}`);
                const ordData = await ordRes.json();

                renderMappings(mapData.mappings);
                renderOrders(ordData.orders);
            } catch (err) {
                showToast("加载数据失败: " + err.message, true);
            }
        }

        function renderMappings(mappings) {
            const container = document.getElementById('mappings-container');
            container.innerHTML = '';
            
            const elements = ['metal', 'wood', 'water', 'fire', 'earth'];
            const namesZh = { metal: '金 (黑曜石)', wood: '木 (绿檀木)', water: '水 (海蓝宝)', fire: '火 (极阳朱砂)', earth: '土 (黄水晶)' };

            elements.forEach(el => {
                const map = mappings[el] || { productId: '', skuId: '', notes: '' };
                const item = document.createElement('div');
                item.className = 'mapping-item';
                item.innerHTML = `
                    <div class="mapping-header">
                        <span class="element-tag">${namesZh[el]}</span>
                    </div>
                    <div class="input-group">
                        <div>
                            <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 0.3rem;">1688 宝贝 ID</label>
                            <input type="text" id="pid-${el}" value="${map.productId}" placeholder="例如: 658930192840" style="padding: 0.5rem; font-size: 0.8rem; margin: 0; text-align: left;">
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 0.3rem;">规格 SKU ID</label>
                            <input type="text" id="sku-${el}" value="${map.skuId}" placeholder="选填 SKU" style="padding: 0.5rem; font-size: 0.8rem; margin: 0; text-align: left;">
                        </div>
                    </div>
                    <div style="margin-top: -0.5rem;">
                        <label style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 0.3rem;">货源备注</label>
                        <input type="text" id="notes-${el}" value="${map.notes || ''}" placeholder="例如: 推荐源头大厂配珠" style="padding: 0.5rem; font-size: 0.8rem; margin: 0 0 0.8rem 0; text-align: left;">
                    </div>
                    <button class="btn-admin" onclick="saveMapping('${el}')" style="padding: 0.4rem 1rem; font-size: 0.75rem;">保存绑定关系</button>
                `;
                container.appendChild(item);
            });
        }

        async function saveMapping(element) {
            const productId = document.getElementById(`pid-${element}`).value;
            const skuId = document.getElementById(`sku-${element}`).value;
            const notes = document.getElementById(`notes-${element}`).value;

            try {
                const res = await fetch(`/api/admin/update-mapping?token=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ element, productId, skuId, notes })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`${element.toUpperCase()} 商品货源保存成功！`);
                    loadDashboardData();
                } else {
                    showToast(data.error || "保存失败", true);
                }
            } catch (err) {
                showToast("保存异常: " + err.message, true);
            }
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-list');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #888; padding: 3rem;">暂无结缘订单记录</td></tr>';
                return;
            }

            orders.forEach(o => {
                const dateStr = new Date(o.createdAt).toLocaleString();
                const statusClass = o.status === 'synced_to_1688' ? 'status-synced' : 'status-pending';
                const statusText = o.status === 'synced_to_1688' ? '已对接 1688' : '待代发下单';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 600; color: #fff;">${o.orderId}</div>
                        <div style="font-size: 0.75rem; color: #666; margin-top: 0.2rem;">${dateStr}</div>
                    </td>
                    <td>
                        <div class="customer-info">
                            <p><span class="customer-name">${o.customer.fullName}</span> <span style="color:#888;">(${o.customer.phoneNumber})</span></p>
                            <p class="customer-address">${o.customer.shippingAddress}</p>
                            <p style="font-size:0.75rem; color:#666;">邮箱: ${o.customer.email}</p>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight: 600; color: var(--gold);">五行属${o.lackingElement || '无'}</div>
                        <div style="color: #ccc; font-size: 0.8rem; margin-top: 0.2rem;">${o.talismanName}</div>
                    </td>
                    <td>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${o.alibabaOrderId ? `<div style="font-size: 0.7rem; color: #888; margin-top: 0.3rem;">1688 单号:<br>${o.alibabaOrderId}</div>` : ''}
                    </td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            ${o.status !== 'synced_to_1688' 
                                ? `<button class="btn-table btn-sync" onclick="syncOrder('${o.orderId}')">一键代发下单</button>` 
                                : `<button class="btn-table" disabled style="opacity: 0.5; cursor: not-allowed;">已同步 1688</button>`
                            }
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function syncOrder(orderId) {
            try {
                showToast("正在请求 1688 API 创建代发订单...", false);
                const res = await fetch(`/api/admin/sync-1688?token=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    loadDashboardData();
                } else {
                    showToast(data.error || "代发下单失败", true);
                }
            } catch (err) {
                showToast("一键代发接口请求异常: " + err.message, true);
            }
        }

        function exportCsv() {
            window.location.href = `/api/admin/export-csv?token=${encodeURIComponent(adminToken)}`;
        }
    </script>
</body>
</html>
