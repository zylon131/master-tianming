<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TianMing | Free Zodiac Check</title>
    <meta name="description" content="Discover your Chinese Zodiac animal sign for free. Enter your birth date and reveal your destiny.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body>
    <div class="container" style="max-width: 560px; padding: 0 2rem;">
        <header style="border-bottom: 1px solid rgba(0,0,0,0.05); padding: 2rem 0; margin-bottom: 3rem;">
            <a href="index.html" class="logo">
                <div class="bagua-icon"></div>
                <span>天命</span>
                <span class="logo-text">TianMing</span>
            </a>
            <div class="lang-switch" id="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中</button>
            </div>
        </header>

        <div style="text-align: center; margin-bottom: 3rem;">
            <h2 class="i18n" data-key="zodiac_title" style="font-family: var(--font-serif); font-size: 2.2rem; margin-bottom: 0.8rem;">Discover Your Animal Spirit</h2>
            <p class="i18n" data-key="zodiac_desc" style="color: #666; font-size: 0.95rem; line-height: 1.6;">Enter your birth date to instantly reveal your Chinese Zodiac sign and core personality traits—100% free.</p>
        </div>

        <form id="zodiac-form" style="margin-bottom: 2rem;">
            <div style="display: flex; gap: 0.6rem; margin-bottom: 1.5rem;">
                <select id="zodiac-dob-year" required style="flex: 2; padding: 1rem 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; color: #333; background: #fff; font-family: var(--font-sans);"></select>
                <select id="zodiac-dob-month" required style="flex: 1; padding: 1rem 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; color: #333; background: #fff; font-family: var(--font-sans);"></select>
                <select id="zodiac-dob-day" required style="flex: 1; padding: 1rem 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; color: #333; background: #fff; font-family: var(--font-sans);"></select>
            </div>
            <button type="submit" class="btn btn-primary i18n" data-key="btn_reveal_zodiac" style="width: 100%; padding: 1rem; font-size: 1rem; letter-spacing: 1px;">Reveal My Zodiac</button>
        </form>

        <div id="zodiac-result" style="display: none; text-align: center; padding: 3rem 2rem; background: #fff; border: 1px solid rgba(197,160,89,0.2); border-radius: 12px;">
            <!-- Result injected here by JS -->
        </div>

        <footer style="text-align: center; padding: 3rem 0 2rem; margin-top: 3rem; border-top: 1px solid rgba(0,0,0,0.05);">
            <a href="index.html" class="i18n" data-key="btn_back" style="display: inline-block; color: var(--ink-black); text-decoration: none; font-size: 0.9rem; font-weight: 600; padding: 0.8rem 1.5rem; border: 1px solid rgba(0,0,0,0.1); border-radius: 50px; transition: all 0.3s; background: transparent;">← Back to Home</a>
        </footer>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
