<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Destiny | Revealed by Master TianMing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        .report-section { margin-bottom: 4rem; animation: inkBleed 1.5s ease-out; }
        .element-badge {
            display: inline-block; padding: 0.5rem 1.5rem; border-radius: 50px;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; margin-right: 1rem;
        }
        .bazi-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
            margin: 2rem 0; text-align: center;
        }
        .bazi-cell {
            padding: 1.5rem; border: 1px solid #ddd; background: #fff;
        }
        .bazi-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
        .bazi-char { font-family: var(--font-chinese); font-size: 2rem; color: var(--cinnabar); }
        .bazi-en { font-size: 0.8rem; color: #666; }
        
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px; padding: 0 2rem;">
        <header style="border-bottom: 1px solid rgba(0,0,0,0.05); padding: 2rem 0; margin-bottom: 4rem;">
            <a href="index.html" class="logo">
                <div class="bagua-icon"></div>
                <span>天命</span>
                <span class="logo-text">TianMing</span>
            </a>
            <div class="lang-switch" id="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中</button>
            </div>
        </header>

        <div style="text-align: center; margin-bottom: 6rem;">
            <h1 class="i18n" data-key="report_title" style="font-family: var(--font-serif); font-size: 3rem; margin-bottom: 1rem;">Your Destiny Revelation</h1>
            <p class="i18n" data-key="report_subtitle" style="letter-spacing: 3px; color: #888; text-transform: uppercase;">A Private Report by Master TianMing</p>
        </div>

        <div id="report-content">
            <!-- Loading state -->
            <div style="text-align: center; padding: 4rem;">
                <p class="i18n" data-key="processing_calculating">Generating your sacred scroll...</p>
            </div>
        </div>

        <div class="no-print" style="margin-top: 6rem; padding: 4rem; background: var(--ink-black); color: white; text-align: center;">
            <h3 class="i18n" data-key="shop_title" style="font-family: var(--font-serif); font-size: 2rem; margin-bottom: 1rem;">Harmonize Your Energy</h3>
            <p class="i18n" data-key="shop_desc" style="margin-bottom: 3rem; opacity: 0.8;">Based on your unique chart, Master TianMing has selected these sacred talismans to balance your Five Elements.</p>
            
            <div id="recommended-products" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
                <!-- Recommended product will go here -->
            </div>
            
            <a href="index.html#shop" class="i18n" data-key="btn_discover" style="margin-top: 4rem; color: white; border-color: white; display: inline-block; padding: 1rem 2rem; border: 1px solid white;">View All Collections</a>
        </div>
        
        <div style="margin-top: 4rem; text-align: center;" class="no-print">
            <button onclick="window.print()" class="btn btn-primary i18n" data-key="btn_download">Download as PDF</button>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
